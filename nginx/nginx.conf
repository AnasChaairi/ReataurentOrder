# Use Docker's embedded DNS so nginx re-resolves container hostnames after
# restarts instead of caching the IP from startup.
resolver 127.0.0.11 valid=10s ipv6=off;

upstream django_backend {
    server web:8000;
}

upstream daphne_ws {
    server daphne:8001;
}

upstream nextjs_frontend {
    server frontend:3000;
}

# Rate-limiting zones
# ws_handshake: 20 WebSocket upgrade requests per minute per IP (burst of 5)
limit_req_zone $binary_remote_addr zone=ws_handshake:10m rate=20r/m;
# api_write: POST/PUT/PATCH/DELETE rate limit per IP
limit_req_zone $binary_remote_addr zone=api_write:10m rate=60r/m;

server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS in production — uncomment when SSL is configured:
    # return 301 https://$host$request_uri;

    client_max_body_size 10M;

    # API requests -> Django
    location /api/ {
        # Apply write rate-limiting on mutating methods
        limit_req zone=api_write burst=20 nodelay;

        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Admin panel -> Django
    location /admin/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket connections -> Daphne
    # Rate-limited to 20 handshakes/minute per IP to prevent connection floods.
    location /ws/ {
        limit_req zone=ws_handshake burst=5 nodelay;

        proxy_pass http://daphne_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Django static files
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Django media files
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Everything else -> Next.js frontend
    location / {
        proxy_pass http://nextjs_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}

